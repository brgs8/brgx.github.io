<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#07070A" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>BRGX</title>
<style>
:root{--bg:#07070A;--s1:#0D0D11;--s2:#13131A;--s3:#1A1A24;--border:#242432;--text:#E8E4DC;--muted:#8A8596;--dim:#565164;--gold:#C8A84B;--gold2:#DDB95E;--ritual:#C8A84B;--mente:#9B72CF;--corpo:#4CAF7D;--criacao:#E8923A;--trabalho:#4A9EE0;--reg:#5BA4CF;--vinculo:#E8627A;--fin:#48C9B0;--sono:#555568}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Segoe UI,sans-serif}body{min-height:100vh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}button,input,textarea{font:inherit}button{color:inherit}.app{max-width:760px;margin:0 auto;padding:18px 14px 96px}.top{position:sticky;top:0;z-index:5;margin:-18px -14px 14px;padding:16px 14px 12px;background:linear-gradient(180deg,#07070A 80%,rgba(7,7,10,.72));backdrop-filter:blur(14px);border-bottom:1px solid rgba(200,168,75,.12)}.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}.logo{letter-spacing:4px;font-size:24px;font-weight:800;color:var(--gold)}.sub{font-size:11px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}.pill{border:1px solid rgba(200,168,75,.25);background:rgba(200,168,75,.1);color:var(--gold2);border-radius:999px;padding:7px 10px;font-size:11px;letter-spacing:.8px}.grid{display:grid;gap:12px}.card{background:linear-gradient(180deg,var(--s2),var(--s1));border:1px solid var(--border);border-radius:18px;padding:15px;box-shadow:0 12px 34px rgba(0,0,0,.24)}.card.gold{border-color:rgba(200,168,75,.32);background:radial-gradient(circle at top right,rgba(200,168,75,.14),transparent 45%),linear-gradient(180deg,var(--s2),var(--s1))}.row{display:flex;align-items:center;gap:10px}.between{display:flex;justify-content:space-between;align-items:center;gap:10px}.title{font-size:15px;font-weight:760}.small{font-size:12px;color:var(--muted);line-height:1.45}.micro{font-size:10px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}.big{font-size:28px;font-weight:850;line-height:1.05}.progress{height:9px;background:#20202b;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;transition:.25s}.btn{border:1px solid var(--border);background:var(--s3);border-radius:12px;padding:10px 12px;font-weight:700;font-size:13px}.btn.gold{border-color:rgba(200,168,75,.4);background:rgba(200,168,75,.14);color:var(--gold2)}.btn.full{width:100%}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:10;background:rgba(13,13,17,.92);backdrop-filter:blur(18px);border-top:1px solid var(--border);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:center}.tabs-inner{max-width:760px;width:100%;display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.tab{border:0;background:transparent;color:var(--muted);border-radius:14px;padding:8px 2px;font-size:10px;display:grid;gap:3px;place-items:center}.tab b{font-size:18px;font-weight:600}.tab.active{background:rgba(200,168,75,.12);color:var(--gold)}.task{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;padding:11px 0;border-top:1px solid rgba(255,255,255,.055)}.task:first-child{border-top:0}.check{width:25px;height:25px;border-radius:8px;border:2px solid var(--dim);background:transparent;display:grid;place-items:center;margin-top:1px}.check.on{background:color-mix(in srgb,var(--c) 18%,transparent);border-color:var(--c);color:var(--c)}.tag{font-size:9px;text-transform:uppercase;letter-spacing:.9px;border:1px solid color-mix(in srgb,var(--c) 35%,transparent);color:var(--c);background:color-mix(in srgb,var(--c) 12%,transparent);border-radius:999px;padding:3px 7px;white-space:nowrap}.time{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:var(--muted)}.focus-input,textarea{width:100%;border:1px solid var(--border);background:#0A0A0E;color:var(--text);border-radius:14px;padding:12px;outline:none}.focus-input{font-size:16px;font-weight:760}textarea{min-height:110px;resize:vertical;line-height:1.45}.indicator{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.kpi>div{background:#0A0A0E;border:1px solid var(--border);border-radius:14px;padding:12px}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.daydot{border:1px solid var(--border);background:#0A0A0E;border-radius:12px;padding:8px 4px;text-align:center}.daydot.today{border-color:rgba(200,168,75,.55)}.dotbar{height:5px;border-radius:99px;background:#242430;overflow:hidden;margin-top:6px}.hide{display:none!important}.lock{min-height:100vh;display:grid;place-items:center;padding:24px}.lockbox{width:min(420px,100%)}.danger{color:#E8627A}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.section-title{margin:18px 2px 8px;font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1.2px}.quote{border-left:3px solid var(--gold);padding-left:12px;color:var(--muted);line-height:1.5}.principle{padding:10px 0;border-top:1px solid rgba(255,255,255,.06)}.principle:first-child{border-top:0}@supports not (color:color-mix(in srgb, red 50%, blue)){.tag{background:rgba(200,168,75,.12);border-color:rgba(200,168,75,.25);color:var(--gold)}.check.on{background:rgba(200,168,75,.14);border-color:var(--gold);color:var(--gold)}}
</style>
</head><body>
<div id="lock" class="lock hide"><div class="lockbox card gold"><div class="logo">BRGX</div><p class="small">Acesso local. Esta senha protege o app de acesso casual pelo link.</p><input id="pass" class="focus-input" placeholder="Digite sua chave BRGX" type="password"/><br><br><button class="btn gold full" onclick="unlock()">Entrar</button><p class="small">Primeiro acesso: defina uma senha. Depois ela fica salva neste iPhone.</p></div></div>
<div id="app" class="app hide"><header class="top"><div class="brand"><div><div class="logo">BRGX</div><div class="sub" id="dateLine">Sistema pessoal de execução</div></div><button class="pill" onclick="setTab('hoje')">HOJE</button></div></header><main id="view"></main></div>
<nav class="tabs hide" id="tabs"><div class="tabs-inner"><button class="tab active" data-tab="hoje" onclick="setTab('hoje')"><b>◎</b>Hoje</button><button class="tab" data-tab="rotinas" onclick="setTab('rotinas')"><b>◌</b>Rotinas</button><button class="tab" data-tab="semana" onclick="setTab('semana')"><b>▦</b>Semana</button><button class="tab" data-tab="holistico" onclick="setTab('holistico')"><b>✦</b>Holístico</button><button class="tab" data-tab="backup" onclick="setTab('backup')"><b>⇩</b>Backup</button></div></nav>
<script>
const CATS={ritual:['Ritual','var(--ritual)'],mente:['Mente','var(--mente)'],corpo:['Corpo','var(--corpo)'],criacao:['Criação','var(--criacao)'],trabalho:['Trabalho','var(--trabalho)'],reg:['Regeneração','var(--reg)'],vinculo:['Vínculo','var(--vinculo)'],fin:['Finanças','var(--fin)'],sono:['Sono','var(--sono)']};
const DAYS=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
const META={SEG:['Segunda','Folga / estrutura'],TER:['Terça','Execução'],QUA:['Quarta','Virada da semana'],QUI:['Quinta','Consistência'],SEX:['Sexta','Fechamento'],SAB:['Sábado','Execução + restauração'],DOM:['Domingo','Estrutura semanal']};
const morning=[['05:10','05:25','Despertar, limão, janelas e cama','ritual',1],['05:25','05:50','Leitura diária holística + intenção','mente',1],['05:50','06:20','Meditação','mente',1],['06:20','07:10','Treino ou natação','corpo',1],['07:10','07:35','Shake, skincare, remédio e postura','corpo',1]];
const night=[['19:30','20:15','Descompressão e alimentação','reg',1],['20:15','21:00','Leitura ou conteúdo intencional','mente',1],['21:00','21:25','Controle financeiro BRGX','fin',1],['21:25','21:55','Diário, reflexão e não fumo','ritual',1],['22:00','05:10','Sono 7h10','sono',0]];
const work=[['09:00','09:30','Transporte / transição de foco','trabalho',0],['10:00','19:00','Trabalho externo','trabalho',0],['19:00','19:30','Transporte casa','trabalho',0]];
const S={
SEG:[...morning,['07:35','08:30','Estudo profundo / curso','criacao',1],['08:30','09:15','Bloco estratégico','criacao',1],['09:15','10:00','Café, agenda e e-mail VIP','ritual',1],['10:00','13:00','Estrutura livre','criacao',0],['13:00','14:00','Almoço sem tela','reg',1],['14:00','16:30','Criação / produto digital','criacao',1],['16:30','17:30','Vínculo social','vinculo',1],['17:30','19:00','Expressão livre','vinculo',1],...night],
TER:[...morning,['07:35','08:05','Estudo por áudio','criacao',1],['08:05','09:00','Café, agenda e prioridade crítica','ritual',1],...work,...night],
QUA:[...morning,['07:35','08:05','Estudo por áudio','criacao',1],['08:05','09:00','Revisão mid-week','ritual',1],...work,['19:30','20:15','Descompressão e alimentação','reg',1],['20:15','21:00','Bloco criativo','criacao',1],...night.slice(2)],
QUI:[...morning,['07:35','08:05','Estudo / leitura','criacao',1],['08:05','09:00','Café, agenda e e-mail VIP','ritual',1],...work,...night],
SEX:[...morning,['07:35','08:05','Conteúdo estratégico','criacao',1],['08:05','09:00','Fechamento da semana','ritual',1],...work,['19:30','20:30','Descompressão sem tela','reg',1],['20:30','21:30','Vínculo social','vinculo',1],['21:30','22:00','Diário + BRGX parcial','ritual',1],['22:00','05:10','Sono 7h10','sono',0]],
SAB:[...morning,['07:35','08:05','Estudo / curso','criacao',1],['08:05','09:00','Café + máscara facial','ritual',1],...work,['19:30','20:30','Restauração / banho longo','reg',1],['20:30','21:30','Expressão livre','vinculo',1],['21:30','22:00','Reflexão semanal','ritual',1],['22:00','05:10','Sono 7h10','sono',0]],
DOM:[['05:10','05:40','Despertar lento e limão','ritual',1],['05:40','06:30','Leitura semanal holística','mente',1],['06:30','07:10','Meditação longa','mente',1],['07:10','08:00','Treino regenerativo','corpo',1],['08:00','08:30','Shake, skincare e sol','corpo',1],['08:30','10:00','Estrutura semanal BRGX','criacao',1],['10:00','12:00','Criação livre','criacao',1],['12:00','14:00','Vínculo / família / amigos','vinculo',1],['14:00','16:30','Regeneração','reg',1],['16:30','18:00','Expressão livre','vinculo',1],['18:00','19:30','Alimentação e preparo da semana','reg',1],['19:30','21:00','Revisão BRGX semanal','fin',1],['21:00','21:55','Diário e intenção da semana','ritual',1],['22:00','05:10','Sono 7h10','sono',0]]};
const habits=[['Água morna + limão','ritual'],['Leitura diária holística','mente'],['Meditação','mente'],['Treino / natação','corpo'],['Shake proteico','corpo'],['Skincare','corpo'],['Remédio','corpo'],['Postura 5min','corpo'],['Controle financeiro','fin'],['Diário escrito','ritual'],['Não fumo','corpo'],['Estudo / criação','criacao']];
const principles=['Vitória diária antes de perfeição.','O sistema deve reduzir atrito, não aumentar obrigação.','Princípios não ficam soltos: viram decisões práticas.','Trabalho entra como compromisso do dia, não como conteúdo estrutural.','Holístico orienta; execução decide.'];
let tab='hoje'; const $=id=>document.getElementById(id); const key=(...a)=>'brgx:'+a.join(':');
function today(){return new Date().toISOString().slice(0,10)} function day(){return DAYS[new Date().getDay()]} function get(k,d=''){return localStorage.getItem(k)??d} function set(k,v){localStorage.setItem(k,v)}
function checkAuth(){const saved=get('brgx:pass',''); if(!saved){$('lock').classList.remove('hide');return} if(sessionStorage.getItem('brgx:ok')==='1'){show()} else $('lock').classList.remove('hide')}
function unlock(){const p=$('pass').value.trim(); if(!p)return; const saved=get('brgx:pass',''); if(!saved){set('brgx:pass',p);sessionStorage.setItem('brgx:ok','1');show();return} if(p===saved){sessionStorage.setItem('brgx:ok','1');show()} else alert('Senha incorreta.')}
function show(){$('lock').classList.add('hide');$('app').classList.remove('hide');$('tabs').classList.remove('hide');render()}
function setTab(t){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));render()}
function taskId(d,i){return key('task',today(),d,i)} function doneFor(date,d){const arr=S[d];let total=0,done=0;arr.forEach((x,i)=>{if(x[4]){total++; if(get(key('task',date,d,i),'0')==='1')done++}});return {done,total,pct:total?Math.round(done/total*100):0}}
function toggle(id){set(id,get(id,'0')==='1'?'0':'1');render()} function cat(c){return CATS[c]||['Bloco','var(--gold)']}
function render(){const d=day(); const date=new Date(); $('dateLine').textContent=`${META[d][0]} · ${date.toLocaleDateString('pt-BR',{day:'2-digit',month:'long'})}`; if(tab==='hoje')renderHoje(d); if(tab==='rotinas')renderRotinas(); if(tab==='semana')renderSemana(); if(tab==='holistico')renderHolistico(); if(tab==='backup')renderBackup()}
function renderHoje(d){const data=doneFor(today(),d), focus=get(key('focus',today()),''), note=get(key('note',today()),''); const current=currentBlock(S[d]); $('view').innerHTML=`<div class="grid"><section class="card gold"><div class="between"><div><div class="micro">${META[d][0]} · ${META[d][1]}</div><div class="big">Hoje</div></div><div class="pill">${data.done}/${data.total} · ${data.pct}%</div></div><br><div class="progress"><div class="bar" style="width:${data.pct}%"></div></div></section>${current?`<section class="card" style="border-color:${cat(current[3])[1]}"><div class="micro">Agora</div><div class="title">${current[0]}–${current[1]} · ${current[2]}</div><div class="small">Bloco: ${cat(current[3])[0]}</div></section>`:''}<section class="card"><div class="section-title">Vitória do dia</div><input class="focus-input" value="${esc(focus)}" placeholder="O que precisa acontecer hoje para o dia ser uma vitória?" oninput="set('${key('focus',today())}',this.value)"></section><section class="card"><div class="section-title">Checklist do dia</div>${S[d].map((x,i)=>task(x,i,d)).join('')}</section><section class="card"><div class="section-title">Notas rápidas</div><textarea placeholder="Registre decisões, ajustes e observações do dia..." oninput="set('${key('note',today())}',this.value)">${esc(note)}</textarea></section></div>`}
function task(x,i,d){const [s,e,l,c,ch]=x, on=get(taskId(d,i),'0')==='1', cc=cat(c); return `<div class="task"><button class="check ${on?'on':''}" style="--c:${cc[1]}" onclick="toggle('${taskId(d,i)}')">${on?'✓':''}</button><div><div class="title">${esc(l)}</div><div class="time">${s}–${e}</div></div><span class="tag" style="--c:${cc[1]}">${cc[0]}</span></div>`}
function renderRotinas(){const d=today(); $('view').innerHTML=`<section class="card gold"><div class="big">Rotinas</div><p class="small">Hábitos agrupados por cor. O objetivo é associação rápida, não leitura longa.</p></section><br><section class="card">${habits.map((h,i)=>{const id=key('habit',d,i),on=get(id,'0')==='1',cc=cat(h[1]);return `<div class="task"><button class="check ${on?'on':''}" style="--c:${cc[1]}" onclick="toggle('${id}')">${on?'✓':''}</button><div><div class="title">${h[0]}</div><div class="small">${cc[0]}</div></div><span class="tag" style="--c:${cc[1]}">${cc[0]}</span></div>`}).join('')}</section><div class="section-title">Princípios aplicados</div><section class="card">${principles.map(p=>`<div class="principle small">${p}</div>`).join('')}</section>`}
function renderSemana(){let html='<section class="card gold"><div class="big">Dashboard semanal</div><p class="small">Execução, pendências e direção prática.</p></section><br><section class="card"><div class="week">'; const now=new Date(); for(let off=0;off<7;off++){let dd=new Date(now);dd.setDate(now.getDate()-now.getDay()+off);let ds=dd.toISOString().slice(0,10), d=DAYS[dd.getDay()], r=doneFor(ds,d);html+=`<div class="daydot ${ds===today()?'today':''}"><div class="micro">${d}</div><b>${r.pct}%</b><div class="dotbar"><div class="bar" style="width:${r.pct}%"></div></div></div>`} html+='</div></section><br><section class="card"><div class="section-title">Próximos passos</div><textarea placeholder="Liste pendências, prioridades e próximos passos da semana..." oninput="set(\''+key('weeknote',weekId())+'\',this.value)">'+esc(get(key('weeknote',weekId()),''))+'</textarea></section>'; $('view').innerHTML=html}
function renderHolistico(){const txt=get(key('holistico',today()),defaultReading()); $('view').innerHTML=`<section class="card gold"><div class="big">Holístico</div><p class="small">Módulo separado. Aqui fica só a leitura prática do dia.</p></section><br><section class="card"><textarea oninput="set('${key('holistico',today())}',this.value)">${esc(txt)}</textarea></section><br><section class="card"><div class="section-title">Estrutura da leitura</div><div class="quote">Energia predominante · Insight psicológico · Risco comportamental · Oportunidade do dia · Direção objetiva.</div></section>`}
function renderBackup(){const data=JSON.stringify(localStorage,null,2); $('view').innerHTML=`<section class="card gold"><div class="big">Backup</div><p class="small">Exporte seus dados para não depender só do navegador.</p><button class="btn gold full" onclick="downloadBackup()">Exportar backup BRGX</button></section><br><section class="card"><div class="section-title">Dados locais</div><textarea readonly>${esc(data)}</textarea></section><br><section class="card"><button class="btn full danger" onclick="if(confirm('Apagar dados locais do BRGX neste iPhone?')){localStorage.clear();location.reload()}">Apagar dados locais</button></section>`}
function currentBlock(arr){const n=new Date(),m=n.getHours()*60+n.getMinutes();for(const x of arr){let a=mins(x[0]),b=mins(x[1]),mm=m;if(b<a)b+=1440;if(mm<a&&x[3]==='sono')mm+=1440;if(mm>=a&&mm<b)return x}return null} function mins(s){const [h,m]=s.split(':').map(Number);return h*60+m}
function defaultReading(){return `Energia predominante: objetividade com autocuidado.\n\nInsight psicológico: evite transformar organização em excesso de controle.\n\nRisco comportamental: dispersar por querer resolver tudo ao mesmo tempo.\n\nOportunidade do dia: cumprir o bloco atual com presença total.\n\nDireção objetiva: escolha uma vitória principal e execute antes de expandir.`}
function weekId(){const d=new Date(),onejan=new Date(d.getFullYear(),0,1);return d.getFullYear()+'-'+Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7)}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function downloadBackup(){const blob=new Blob([JSON.stringify(localStorage,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='brgx-backup-'+today()+'.json';a.click();URL.revokeObjectURL(a.href)}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{}); checkAuth();
</script></body></html>
